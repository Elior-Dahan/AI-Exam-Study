<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>צייד הנאש 🎲 | משחקי למידה</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="games.css">
</head>
<body>

<div class="topbar"><div class="inner">
  <a class="home" href="index.html">🏠 דף הבית</a>
  <span class="sep">|</span>
  <a href="משחקים.html">🎮 כל המשחקים</a>
  <span class="sep">·</span>
  <a href="04_תורת_משחקים.html">📖 הנושא</a>
</div></div>

<div class="wrap">
  <div class="page-head">
    <p class="eyebrow">משחק · נושא 04</p>
    <h1>🎲 צייד הנאש</h1>
    <span class="ref">מצא שיווי משקל נאש · ושחק דילמת אסיר נגד ה-AI</span>
  </div>

  <div class="gx-row" style="margin:6px 0 14px"><div id="mode"></div></div>
  <div id="score"></div>
  <div class="gx-prompt" id="prompt"></div>
  <div id="stage"></div>

  <div class="gx-row" style="margin-top:14px">
    <a class="gx-btn gx-btn-ghost" href="04_תורת_משחקים.html">📖 חזרה להסבר</a>
  </div>
</div>

<script type="module">
import { PD_MATRIX, IESDS } from './games-data.js';
import { Scoreboard, toast, winModal, segmented, el, shake } from './games-core.js';

const score = new Scoreboard('nash');
document.getElementById('score').appendChild(score.el);
const stage = document.getElementById('stage');
const prompt = document.getElementById('prompt');

// ============ מצב 1: מצא את הנאש ============
const puzzles = [PD_MATRIX, IESDS];
let pi = 0, misses = 0;

function isNash(M, r, c) { return M.nash.some(([nr, nc]) => nr === r && nc === c); }

function renderFindNash() {
  const M = puzzles[pi];
  prompt.innerHTML = '🎯 לחץ על התא שהוא <b>שיווי משקל נאש</b> &nbsp;(' + M.title + ')';
  stage.innerHTML = '';
  const tbl = el('table', { class: 'gx-matrix' });
  const head = el('tr', {}, [el('th', { text: '' }), ...M.cols.map(c => el('th', { text: 'עמודה ' + c }))]);
  tbl.appendChild(head);
  M.rows.forEach(r => {
    const tr = el('tr', {}, [el('th', { text: 'שורה ' + r })]);
    M.cols.forEach(c => {
      const [u1, u2] = M.pay[r][c];
      const td = el('td', { class: 'cell', text: '(' + u1 + ', ' + u2 + ')' });
      td.addEventListener('click', () => {
        if (isNash(M, r, c)) {
          td.classList.add('nash'); score.add(15);
          toast('✓ נכון! אף שחקן לא רוצה לסטות מכאן', 'good');
          [...tbl.querySelectorAll('.cell')].forEach(x => x.style.pointerEvents = 'none');
          pi++;
          setTimeout(() => { pi < puzzles.length ? renderFindNash() : finishFind(); }, 1100);
        } else {
          misses++; score.miss(); td.classList.add('wrong'); shake(td);
          toast('✗ בדוק: האם מישהו ירצה לסטות מכאן?', 'bad');
          setTimeout(() => td.classList.remove('wrong'), 600);
        }
      });
      tr.appendChild(td);
    });
    tbl.appendChild(tr);
  });
  stage.appendChild(tbl);
  stage.appendChild(el('p', { class: 'cap', style: { textAlign: 'center', color: 'var(--muted)' }, text: '(u₁ = תשלום שחקן השורה, u₂ = תשלום שחקן העמודה)' }));
}
function finishFind() {
  const stars = misses === 0 ? 3 : misses <= 2 ? 2 : 1;
  winModal({ title: 'מצאת את כל שיווי המשקל! 🎯', stars, gameId: 'nash',
    html: '<p>נאש = אף שחקן לא משתפר מסטייה חד-צדדית.</p><p>ניקוד: <b>' + score.score + '</b></p>' });
}

// ============ מצב 2: שחק דילמת אסיר נגד ה-AI ============
const ROUNDS = 8;
let round, myTotal, aiTotal, lastMine;

function renderPlay() {
  round = 0; myTotal = 0; aiTotal = 0; lastMine = null;
  prompt.innerHTML = '🤖 שחק נגד <b>Tit-for-Tat</b>: משתף בהתחלה, ואז מחקה את המהלך הקודם שלך. 8 סבבים.';
  stage.innerHTML = '';
  const board = el('div', { class: 'gx-board' });
  const totals = el('div', { class: 'gx-row', style: { fontSize: '18px', fontWeight: '700', marginBottom: '10px' } });
  board.appendChild(totals);
  const log = el('div', { id: 'pdlog', style: { maxWidth: '440px', margin: '0 auto' } });
  board.appendChild(log);
  const controls = el('div', { class: 'gx-row', style: { marginTop: '12px' } }, [
    el('button', { class: 'gx-btn gx-btn-ok', html: '🤝 שתף פעולה (C)', onclick: () => play('C') }),
    el('button', { class: 'gx-btn', style: { background: 'var(--warn)', color: '#fff', borderColor: 'var(--warn)' }, html: '😈 בגוד (D)', onclick: () => play('D') })
  ]);
  board.appendChild(controls);
  stage.appendChild(board);
  updateTotals();
  function updateTotals() {
    totals.innerHTML = '';
    totals.append(
      el('span', { html: '🙂 אתה: <b style="color:var(--ok)">' + myTotal + '</b>' }),
      el('span', { html: '&nbsp;·&nbsp;' }),
      el('span', { html: '🤖 ה-AI: <b style="color:var(--warn)">' + aiTotal + '</b>' }),
      el('span', { html: '&nbsp;·&nbsp; סבב ' + (round) + '/' + ROUNDS })
    );
  }
  window._pdUpdate = updateTotals;
}
function play(mine) {
  if (round >= ROUNDS) return;
  const ai = lastMine == null ? 'C' : lastMine; // Tit-for-Tat
  const [u1, u2] = PD_MATRIX.pay[mine][ai];
  myTotal += u1; aiTotal += u2; lastMine = mine; round++;
  const log = document.getElementById('pdlog');
  const txt = (mine === 'C' ? '🤝' : '😈') + ' אתה: ' + mine + ' &nbsp;|&nbsp; ' + (ai === 'C' ? '🤝' : '😈') + ' AI: ' + ai
    + ' &nbsp;→&nbsp; +' + u1 + ' / +' + u2;
  log.appendChild(el('div', { html: txt, style: { padding: '6px 0', borderBottom: '1px solid var(--line)', textAlign: 'center' } }));
  window._pdUpdate();
  if (round >= ROUNDS) {
    const won = myTotal >= aiTotal;
    const lesson = lastMine === 'D' && myTotal < aiTotal
      ? 'בגידה גררה עונש בסבב הבא — לכן שיתוף פעולה משתלם יותר במשחק חוזר.'
      : 'שיתוף פעולה הדדי נתן לשניכם תשלום גבוה לאורך זמן — בדיוק כוח המשחק החוזר.';
    score.add(myTotal);
    winModal({ title: won ? 'סיימת חזק! 🤝' : 'סיבוב הסתיים', stars: 3, gameId: 'nash',
      html: '<p>אתה: <b>' + myTotal + '</b> · AI: <b>' + aiTotal + '</b></p><p>' + lesson + '</p>' });
  }
}

// ============ בורר מצב ============
const seg = segmented(
  [{ label: '🎯 מצא נאש', value: 'find' }, { label: '🤖 שחק נגד AI', value: 'play' }],
  v => { score.reset(); misses = 0; if (v === 'find') { pi = 0; renderFindNash(); } else renderPlay(); },
  'find'
);
document.getElementById('mode').appendChild(seg);
renderFindNash();
</script>
</body>
</html>
