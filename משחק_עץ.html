<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בונה עצי החלטה 🎾 | משחקי למידה</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="games.css">
</head>
<body>

<div class="topbar"><div class="inner">
  <a class="home" href="index.html">🏠 דף הבית</a>
  <span class="sep">|</span>
  <a href="משחקים.html">🎮 כל המשחקים</a>
  <span class="sep">·</span>
  <a href="07_עצי_החלטה.html">📖 הנושא</a>
</div></div>

<div class="wrap">
  <div class="page-head">
    <p class="eyebrow">משחק · נושא 07</p>
    <h1>🎾 בונה עצי החלטה</h1>
    <span class="ref">3 רמות · אנטרופיה ו-IG ← בניית עץ ← סיווג ואתגר</span>
  </div>

  <div class="card">
    <p>חשב אנטרופיה ו-Information Gain, בחר בכל צומת את התכונה עם ה-IG המקסימלי (ID3), וסווג דוגמאות חדשות. נתחיל בסט קטן וממשיכים ל-PlayTennis.</p>
  </div>

  <div id="game-root"></div>

  <div class="gx-row" style="margin-top:18px">
    <a class="gx-btn gx-btn-ghost" href="07_עצי_החלטה.html">📖 חזרה להסבר</a>
  </div>
</div>

<script type="module">
import { PLAYTENNIS, DTREE_TOY } from './games-data.js';
import { id3Solve, runLevels } from './games-engine.js';
import { el, toast, shake } from './games-core.js';

const PT = { attrs: PLAYTENNIS.attrs, target: 'Play', rows: PLAYTENNIS.rows };
const sunny = r => r.Outlook === 'Sunny', rain = r => r.Outlook === 'Rain';

// ---------- סבב: אנטרופיה ----------
function roundEntropy(ds, filter, label) {
  return {
    title: 'אנטרופיה' + (label ? ' · ' + label : ''), data: ds, play(host, ctx) {
      const rows = filter ? ds.rows.filter(filter) : ds.rows, id3 = id3Solve(ds), H = id3.entropy(rows);
      const pos = rows.filter(r => r[ds.target] === 1).length, neg = rows.length - pos;
      host.append(el('p', { class: 'gx-panel', html: (label ? '<b>' + label + '</b>: ' : '') + 'חשב <b>H(S)</b> עבור <b>' + pos + '</b> חיובי ו-<b>' + neg + '</b> שלילי (סה"כ ' + rows.length + '). עגל ל-2 ספרות.' }));
      host.append(el('div', { class: 'gx-calc' }, [el('div', { class: 'expr', html: 'H = −(' + pos + '/' + rows.length + ')·log₂(' + pos + '/' + rows.length + ') − (' + neg + '/' + rows.length + ')·log₂(' + neg + '/' + rows.length + ')' })]));
      const input = el('input', { class: 'gx-num-in', type: 'text', inputmode: 'decimal', placeholder: 'H=?' });
      input.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
      function check() {
        const v = parseFloat(String(input.value).replace(',', '.'));
        if (isNaN(v)) { toast('הקלד מספר', 'info'); return; }
        if (Math.abs(v - H) <= 0.02) { input.classList.add('ok'); input.disabled = true; ctx.score.add(15); toast('✓ H=' + H.toFixed(3), 'good'); setTimeout(ctx.done, 900); }
        else { input.classList.add('bad'); ctx.score.miss(); ctx.addMiss(); shake(input); toast('✗ טהור→0, חצי-חצי→1', 'bad'); setTimeout(() => input.classList.remove('bad'), 500); }
      }
      host.append(el('div', { class: 'gx-row' }, [input, el('button', { class: 'gx-btn gx-btn-primary', text: 'בדוק', onclick: check }),
        el('button', { class: 'gx-btn gx-btn-ghost', text: '💡 רמז', onclick: () => toast('log₂(1/2)=−1 · log₂(1/4)=−2 · log₂(3/8)≈−1.415', 'info') })]));
      input.focus();
    }
  };
}

// ---------- סבב: IG של תכונה ----------
function roundGain(ds, attr) {
  return {
    title: 'IG של ' + attr, data: ds, play(host, ctx) {
      const id3 = id3Solve(ds), g = id3.gain(ds.rows, attr), H = id3.entropy(ds.rows);
      host.append(el('p', { class: 'gx-panel', html: 'חשב את <b>IG(' + attr + ')</b> על כל הסט (H(S)=' + H.toFixed(2) + '). עגל ל-2 ספרות.' }));
      host.append(el('div', { class: 'gx-calc' }, [el('div', { class: 'expr', html: 'IG = H(S) − Σ (|S_v|/|S|)·H(S_v)' })]));
      const input = el('input', { class: 'gx-num-in', type: 'text', inputmode: 'decimal', placeholder: 'IG=?' });
      input.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
      function check() {
        const v = parseFloat(String(input.value).replace(',', '.'));
        if (isNaN(v)) { toast('הקלד מספר', 'info'); return; }
        if (Math.abs(v - g) <= 0.02) { input.classList.add('ok'); input.disabled = true; ctx.score.add(18); toast('✓ IG=' + g.toFixed(3), 'good'); setTimeout(ctx.done, 900); }
        else { input.classList.add('bad'); ctx.score.miss(); ctx.addMiss(); shake(input); toast('✗ פצל לפי ערכי ' + attr + ' ושקלל', 'bad'); setTimeout(() => input.classList.remove('bad'), 500); }
      }
      host.append(el('div', { class: 'gx-row' }, [input, el('button', { class: 'gx-btn gx-btn-primary', text: 'בדוק', onclick: check }),
        el('button', { class: 'gx-btn gx-btn-ghost', text: '💡 רמז', onclick: () => toast('IG(' + attr + ')=' + g.toFixed(3), 'info') })]));
      input.focus();
    }
  };
}

// ---------- סבב: בחר תכונה מפצלת ----------
function roundPickBest(ds, filter, avail, label) {
  return {
    title: 'בחר תכונה מפצלת' + (label ? ' · ' + label : ''), data: ds, play(host, ctx) {
      const rows = filter ? ds.rows.filter(filter) : ds.rows, id3 = id3Solve(ds);
      const gains = {}; avail.forEach(a => gains[a] = id3.gain(rows, a));
      const best = avail.reduce((b, a) => gains[a] > gains[b] ? a : b, avail[0]);
      host.append(el('p', { class: 'gx-panel', html: (label ? '<b>' + label + '</b> — ' : '') + 'איזו תכונה נותנת את ה-<b>IG הגבוה ביותר</b>? (' + rows.length + ' דוגמאות)' }));
      const ig = el('div', { style: { maxWidth: '440px', margin: '6px auto' } }), opts = el('div', { class: 'gx-row' });
      host.append(ig, opts);
      avail.forEach(a => opts.appendChild(el('button', { class: 'gx-btn', text: a, onclick: () => {
        if (a === best) { ctx.score.add(15); toast('✓ ' + a + ' (IG=' + gains[a].toFixed(3) + ')', 'good'); showBars(); setTimeout(ctx.done, 1500); }
        else { ctx.score.miss(); ctx.addMiss(); shake(opts); toast('✗ ל-' + a + ' IG נמוך יותר', 'bad'); }
      } })));
      function showBars() {
        opts.innerHTML = ''; ig.innerHTML = ''; const mx = Math.max(...Object.values(gains));
        avail.forEach(a => ig.appendChild(el('div', { class: 'gx-ig-bar' + (a === best ? ' win' : '') }, [
          el('span', { class: 'name', text: a }),
          el('div', { class: 'track' }, [el('div', { class: 'fill', style: { width: Math.round(gains[a] / mx * 100) + '%' } })]),
          el('span', { class: 'val', text: 'IG=' + gains[a].toFixed(3) })])));
      }
    }
  };
}

// ---------- סבב: סיווג ----------
function roundClassify(ds, instances) {
  return {
    title: 'סיווג לפי העץ', data: ds, play(host, ctx) {
      const id3 = id3Solve(ds); let ti = 0;
      host.append(el('p', { class: 'gx-panel', html: 'סווג כל יום לפי עץ ה-ID3 (Outlook → Humidity/Wind, overcast תמיד "כן").' }));
      const prompt = el('p', { class: 'gx-prompt' }), ctr = el('div', { class: 'gx-row' }); host.append(prompt, ctr);
      function next() {
        if (ti >= instances.length) return ctx.done();
        const m = instances[ti];
        prompt.innerHTML = 'יום ' + m.id + ': <span style="direction:ltr;unicode-bidi:isolate;display:inline-block">Outlook=' + m.Outlook + ', Humidity=' + m.Humidity + ', Wind=' + m.Wind + '</span> — לשחק?';
        ctr.innerHTML = '';
        ctr.append(el('button', { class: 'gx-btn gx-btn-ok', text: '🎾 כן', onclick: () => ans(1) }),
          el('button', { class: 'gx-btn', style: { background: 'var(--warn)', color: '#fff', borderColor: 'var(--warn)' }, text: '🚫 לא', onclick: () => ans(0) }));
      }
      function ans(g) {
        const m = instances[ti];
        if (g === id3.classify(m)) { ctx.score.add(12); toast('✓ נכון', 'good'); ti++; setTimeout(next, 650); }
        else { ctx.score.miss(); ctx.addMiss(); shake(ctr); toast('✗ עקוב בעץ: קודם Outlook', 'bad'); }
      }
      next();
    }
  };
}

runLevels({
  gameId: 'dtree',
  levels: [
    { key: '1', name: 'אנטרופיה ו-IG', badge: 'יסוד', desc: 'מדידת אי-סדר ורווח אינפורמציה', rounds: [roundEntropy(DTREE_TOY, null, 'ללמוד?'), roundGain(DTREE_TOY, 'Exam'), roundPickBest(DTREE_TOY, null, DTREE_TOY.attrs)] },
    { key: '2', name: 'בנה עץ — PlayTennis', badge: 'תרגול', desc: 'בחר שורש וענפים לפי IG', rounds: [roundPickBest(PT, null, PT.attrs, 'שורש'), roundPickBest(PT, sunny, ['Temperature', 'Humidity', 'Wind'], 'ענף Sunny'), roundPickBest(PT, rain, ['Temperature', 'Humidity', 'Wind'], 'ענף Rain')] },
    { key: '3', name: 'סיווג ואתגר', badge: 'אתגר', desc: 'חישוב מדויק וסיווג', rounds: [roundEntropy(PT, null, 'PlayTennis'), roundGain(PT, 'Humidity'), roundClassify(PT, PLAYTENNIS.test)] }
  ]
});
</script>
</body>
</html>
