<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מירוץ חיפוש 🔍 | משחקי למידה</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="games.css">
  <script defer src="bidi.js"></script>
</head>
<body>

<div class="topbar"><div class="inner">
  <a class="home" href="index.html">🏠 דף הבית</a>
  <span class="sep">|</span>
  <a href="משחקים.html">🎮 כל המשחקים</a>
  <span class="sep">·</span>
  <a href="02_חיפוש_מיודע.html">📖 הנושא</a>
</div></div>

<div class="wrap">
  <div class="page-head">
    <p class="eyebrow">משחק · נושאים 01–02</p>
    <h1>🔍 מירוץ חיפוש</h1>
    <span class="ref">3 רמות · BFS/DFS ← UCS/Greedy ← A* וקבילוּת</span>
  </div>

  <div class="card">
    <p>נחש איזה צומת ה-frontier (הצהוב) ייפתח הבא לפי האלגוריתם, חשב ערכים, ובדוק קבילוּת. סדר פיתוח: <b>graph-search · goal-test בעת פתיחה · שובר-שוויון אלפביתי</b>.</p>
  </div>

  <div id="game-root"></div>

  <div class="gx-row" style="margin-top:18px">
    <a class="gx-btn gx-btn-ghost" href="02_חיפוש_מיודע.html">📖 חזרה להסבר</a>
  </div>
</div>

<script type="module">
import { SEARCH_GRAPHS } from './games-data.js';
import { searchSteps, idsSteps, isAdmissible, shortestToGoal, runLevels } from './games-engine.js';
import { el, svg, toast, shake } from './games-core.js';

const G = id => SEARCH_GRAPHS.find(g => g.id === id);

// ---------- ציור גרף ----------
function drawGraph(host, graph, state, onClick) {
  const s = svg('svg', { viewBox: '0 0 520 370', style: { maxWidth: '520px', width: '100%', display: 'block', margin: '0 auto' } });
  graph.edges.forEach(([u, v, w]) => {
    const a = graph.nodes[u], b = graph.nodes[v];
    s.appendChild(svg('line', { x1: a.x, y1: a.y, x2: b.x, y2: b.y, stroke: '#c2c9da', 'stroke-width': 2 }));
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    s.appendChild(svg('circle', { cx: mx, cy: my, r: 11, fill: '#fff', stroke: '#c2c9da' }));
    s.appendChild(svg('text', { x: mx, y: my + 4, 'text-anchor': 'middle', 'font-size': 12, fill: '#5b6478', 'font-weight': 700 }, w));
  });
  for (const n in graph.nodes) {
    const nd = graph.nodes[n];
    let fill = '#fff', stroke = '#9aa6c0';
    if (state.expanded && state.expanded.has(n)) { fill = 'var(--ok-soft)'; stroke = 'var(--ok)'; }
    else if (state.frontier && state.frontier.has(n)) { fill = 'var(--accent-soft)'; stroke = 'var(--accent)'; }
    if (nd.goal && !(state.expanded && state.expanded.has(n))) stroke = 'var(--warn)';
    const g = svg('g', { style: { cursor: onClick ? 'pointer' : 'default' } });
    g.appendChild(svg('circle', { cx: nd.x, cy: nd.y, r: 22, fill, stroke, 'stroke-width': nd.goal ? 3 : 2 }));
    g.appendChild(svg('text', { x: nd.x, y: nd.y + (graph.h ? -3 : 5), 'text-anchor': 'middle', 'font-size': 15, 'font-weight': 700, fill: '#1f2533' }, n + (nd.start ? '▶' : '') + (nd.goal ? '◎' : '')));
    if (graph.h) g.appendChild(svg('text', { x: nd.x, y: nd.y + 13, 'text-anchor': 'middle', 'font-size': 10, fill: '#5b6478' }, 'h=' + graph.h[n]));
    if (onClick) g.addEventListener('click', () => onClick(n));
    s.appendChild(g);
  }
  host.appendChild(s);
}

// ---------- סבב: נחש את הצומת הבא ----------
function roundPredict(graphId, algo) {
  const graph = G(graphId);
  return {
    title: 'נחש את הצומת הבא · ' + algo, data: { graph, algo }, play(host, ctx) {
      const sol = searchSteps(graph, algo), expanded = new Set();
      let si = 0;
      const info = el('p', { class: 'gx-panel', html: '<b>' + algo + '</b> · ' + graph.name + ' — לחץ על הצומת ב-frontier (צהוב) שייפתח הבא.' });
      const prompt = el('p', { class: 'gx-prompt' }), gWrap = el('div', {});
      host.append(info, prompt, gWrap);
      function render() {
        const step = sol.steps[si], frontier = new Set(step.frontier.map(f => f.node));
        const fmt = f => f.node + (algo === 'UCS' ? '(g=' + f.g + ')' : algo === 'Greedy' ? '(h=' + graph.h[f.node] + ')' : algo === 'A*' ? '(f=' + (f.g + graph.h[f.node]) + ')' : '');
        prompt.innerHTML = '<span style="direction:ltr;unicode-bidi:isolate;display:inline-block">Frontier: ' + step.frontier.map(fmt).join(' · ') + '</span>';
        gWrap.innerHTML = '';
        drawGraph(gWrap, graph, { expanded, frontier }, n => {
          if (!frontier.has(n)) return;
          if (n === step.expand) {
            expanded.add(n); ctx.score.add(10); toast('✓ ' + n, 'good');
            if (n === graph.goal) { render(); prompt.innerHTML = '🎉 הגענו ליעד! מסלול: ' + sol.path.join('→') + ' (עלות ' + sol.cost + ')'; setTimeout(ctx.done, 1200); }
            else { si++; render(); }
          } else { ctx.score.miss(); ctx.addMiss(); shake(gWrap); toast('✗ ' + algo + ' פותח קודם את ' + step.expand, 'bad'); }
        });
      }
      render();
    }
  };
}

// ---------- סבב: IDS (העמקה איטרטיבית) ----------
function roundIDS(graphId) {
  const graph = G(graphId);
  return {
    title: 'IDS · העמקה איטרטיבית', data: { graph }, play(host, ctx) {
      const sol = idsSteps(graph); let si = 0, expanded = new Set();
      host.append(el('p', { class: 'gx-panel', html: '<b>IDS</b> · ' + graph.name + ' — DFS עם גבול-עומק גדל. בכל איטרציה מתחילים <b>מחדש מ-S</b> ומעמיקים ברמה. לחץ על הצומת הבא במחסנית.' }));
      const prompt = el('p', { class: 'gx-prompt' }), gWrap = el('div', {});
      host.append(prompt, gWrap);
      function render() {
        const step = sol.steps[si];
        if (step.newIter) expanded = new Set();
        const frontier = new Set(step.frontier);
        prompt.innerHTML = '🔽 <b>גבול-עומק = ' + step.limit + '</b> · מחסנית: <span style="direction:ltr;unicode-bidi:isolate;display:inline-block">' + step.frontier.join(' · ') + '</span>';
        gWrap.innerHTML = '';
        drawGraph(gWrap, graph, { expanded, frontier }, n => {
          if (!frontier.has(n)) return;
          if (n === step.expand) {
            expanded.add(n); ctx.score.add(10); toast('✓ ' + n, 'good');
            if (n === graph.goal) { render(); prompt.innerHTML = '🎉 היעד נמצא בגבול-עומק ' + step.limit + '!'; setTimeout(ctx.done, 1300); }
            else { si++; render(); }
          } else { ctx.score.miss(); ctx.addMiss(); shake(gWrap); toast('✗ IDS פותח קודם את ' + step.expand + ' (מחסנית, אלפביתי)', 'bad'); }
        });
      }
      render();
    }
  };
}

// ---------- סבב: חשב f(n) ----------
function roundCompute(graphId, algo, node) {
  const graph = G(graphId);
  return {
    title: 'חשב ערך', data: { graph, node }, play(host, ctx) {
      const sol = searchSteps(graph, algo);
      const st = sol.steps.find(s => s.expand === node);
      const g = st ? st.g : null, f = g + graph.h[node];
      host.append(el('p', { class: 'gx-panel', html: 'ב-<b>A*</b> על ' + graph.name + ': מהו <b>f(' + node + ') = g(' + node + ') + h(' + node + ')</b> כשהצומת נפתח? (h(' + node + ')=' + graph.h[node] + ')' }));
      const gWrap = el('div', {}); drawGraph(gWrap, graph, { expanded: new Set() }, null); host.append(gWrap);
      const input = el('input', { class: 'gx-num-in', type: 'text', inputmode: 'numeric', placeholder: 'f=?' });
      input.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
      function check() {
        const v = parseFloat(input.value);
        if (isNaN(v)) { toast('הקלד מספר', 'info'); return; }
        if (v === f) { input.classList.add('ok'); input.disabled = true; ctx.score.add(15); toast('✓ f(' + node + ')=g+h=' + g + '+' + graph.h[node] + '=' + f, 'good'); setTimeout(ctx.done, 900); }
        else { input.classList.add('bad'); ctx.score.miss(); ctx.addMiss(); shake(input); toast('✗ g(' + node + ') = העלות הזולה מ-S אליו', 'bad'); setTimeout(() => input.classList.remove('bad'), 500); }
      }
      host.append(el('div', { class: 'gx-row' }, [input, el('button', { class: 'gx-btn gx-btn-primary', text: 'בדוק', onclick: check }),
        el('button', { class: 'gx-btn gx-btn-ghost', text: '💡 רמז', onclick: () => toast('g(' + node + ')=' + g + ' (העלות מהשורש). f=g+h.', 'info') })]));
      input.focus();
    }
  };
}

// ---------- סבב: קבילות h ----------
function roundAdmissible(graphId) {
  const graph = G(graphId);
  return {
    title: 'האם h קבילה?', data: graph, play(host, ctx) {
      const hstar = shortestToGoal(graph);
      const victim = Object.keys(graph.nodes).find(n => !graph.nodes[n].goal);
      const tampered = { ...graph, h: { ...graph.h, [victim]: hstar[victim] + 2 } };
      const qs = [{ g: graph, ans: true }, { g: tampered, ans: false }];
      let qi = 0;
      const prompt = el('p', { class: 'gx-prompt' }), tbl = el('div', { style: { textAlign: 'center', overflowX: 'auto' } }), btns = el('div', { class: 'gx-row' });
      host.append(el('p', { class: 'gx-panel', html: 'היוריסטיקה <b>קבילה</b> אם <b>h(n) ≤ h*(n)</b> לכל צומת (h* = העלות האמיתית ליעד). השווה:' }), prompt, tbl, btns);
      function render() {
        const q = qs[qi], ns = Object.keys(q.g.nodes), hs = shortestToGoal(q.g);
        prompt.innerHTML = 'טבלה ' + (qi + 1) + '/2 — האם h קבילה?';
        tbl.innerHTML = '';
        const t = el('table', { style: { margin: '0 auto', direction: 'ltr' } });
        t.appendChild(el('tr', {}, [el('th', { text: 'node' }), ...ns.map(n => el('th', { text: n }))]));
        t.appendChild(el('tr', {}, [el('th', { text: 'h' }), ...ns.map(n => el('td', { text: q.g.h[n], style: { fontWeight: 700 } }))]));
        t.appendChild(el('tr', {}, [el('th', { text: 'h*' }), ...ns.map(n => el('td', { text: hs[n], style: { color: '#5b6478' } }))]));
        tbl.appendChild(t);
        btns.innerHTML = '';
        btns.append(el('button', { class: 'gx-btn gx-btn-ok', text: '✓ קבילה', onclick: () => ans(true) }),
          el('button', { class: 'gx-btn', style: { background: 'var(--warn)', color: '#fff', borderColor: 'var(--warn)' }, text: '✗ לא קבילה', onclick: () => ans(false) }));
      }
      function ans(a) {
        if (a === qs[qi].ans) { ctx.score.add(14); toast('✓ נכון', 'good'); qi++; if (qi >= qs.length) setTimeout(ctx.done, 800); else render(); }
        else { ctx.score.miss(); ctx.addMiss(); shake(tbl); toast(qs[qi].ans ? '✗ כאן כל h ≤ h*' : '✗ יש צומת עם h > h* — לא קבילה', 'bad'); }
      }
      render();
    }
  };
}

runLevels({
  gameId: 'search',
  levels: [
    { key: '1', name: 'לא-מיודע: BFS/DFS/IDS', badge: 'יסוד', desc: 'תור, מחסנית, והעמקה איטרטיבית', rounds: [roundPredict('g0', 'BFS'), roundPredict('g0', 'DFS'), roundIDS('g1')] },
    { key: '2', name: 'עלות ויוריסטיקה', badge: 'תרגול', desc: 'UCS ו-Greedy על גרף עמוק', rounds: [roundPredict('g3', 'UCS'), roundCompute('g3', 'A*', 'D'), roundPredict('g3', 'Greedy')] },
    { key: '3', name: 'A* וקבילוּת', badge: 'אתגר', desc: 'f=g+h, גרף עמוק, ובדיקת קבילות', rounds: [roundPredict('g3', 'A*'), roundCompute('g3', 'A*', 'E'), roundAdmissible('g3')] }
  ]
});
</script>
</body>
</html>
